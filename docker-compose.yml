#version: "3.9"

services:
  web:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: "0:0"
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: farajamh-web
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URI}
      FLASK_ENV: production
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-.env}
      MAILJET_API_KEY: ${MAILJET_API_KEY}
      MAILJET_SENDER_EMAIL: ${MAILJET_SENDER_EMAIL}
      MAILJET_SENDER_NAME: ${MAILJET_SENDER_NAME}
      MAILJET_API_SECRET: ${MAILJET_API_SECRET}
      FAISS_INDEX_PATH: ${FAISS_INDEX_PATH:-/app/data/faiss/mental_health_cases.index}
      FAISS_METADATA_PATH: ${FAISS_METADATA_PATH:-/app/data/faiss/mental_health_cases_metadata.pkl}
      QUESTIONS_JSON_PATH: ${QUESTIONS_JSON_PATH:-/app/questions.json}
    ports:
      - "8090:5000"
    volumes:
      - ./data:/app/data           # FAISS & artifacts
      - dbdata:/data               # SQLite file (/data/app.db)
    restart: unless-stopped

volumes:
  dbdata:
