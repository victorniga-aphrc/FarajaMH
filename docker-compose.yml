#version: "3.9"

services:
  web:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: "0:0"
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: farajamh-web
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URI}
      FLASK_ENV: production
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-.env}
      MAILJET_API_KEY: ${MAILJET_API_KEY}
      MAILJET_SENDER_EMAIL: ${MAILJET_SENDER_EMAIL}
      MAILJET_SENDER_NAME: ${MAILJET_SENDER_NAME}
      MAILJET_API_SECRET: ${MAILJET_API_SECRET}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USE_TLS: ${MAIL_USE_TLS}
      MAIL_USE_SSL: ${MAIL_USE_SSL}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-noreply@aphrc.org}
      MAIL_SUPPRESS_SEND: ${MAIL_SUPPRESS_SEND:-False}
      FAISS_INDEX_PATH: ${FAISS_INDEX_PATH:-/app/data/faiss/mental_health_cases.index}
      FAISS_METADATA_PATH: ${FAISS_METADATA_PATH:-/app/data/faiss/mental_health_cases_metadata.pkl}
      QUESTIONS_JSON_PATH: ${QUESTIONS_JSON_PATH:-/app/questions.json}
    expose:
      - "5000"
    volumes:
      - ./data:/app/data           # FAISS & artifacts
      - dbdata:/data               # SQLite file (/data/app.db)
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.25-alpine
    container_name: farajamh-proxy
    depends_on:
      - web
    ports:
      - "80:80"
      - "8090:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:rw
    restart: unless-stopped

volumes:
  dbdata:
