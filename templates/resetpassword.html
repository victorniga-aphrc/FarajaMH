{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="card shadow-sm border-0">
        <div class="card-body">
        <div id="auth-error" class="alert alert-danger d-none" role="alert"></div>

          <h3 class="text-center text-primary mb-4">
            <i class="fas fa-lock"></i> Reset Password
          </h3>
          <p class="text-muted text-center mb-4">
            Enter your new password below.
          </p>

          <form id="resetPasswordForm" data-url="{{ url_for('auth.confirm_reset_password') }}">
            <div class="mb-3">
              <label for="newPassword" class="form-label">New Password</label>
              <input type="password" class="form-control" id="newPassword" name="new_password" required minlength="5">
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" name="confirm_password" required minlength="5">
            </div>
            <button type="submit" class="btn btn-success w-100">Set Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
