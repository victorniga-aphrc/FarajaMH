{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="card shadow-sm border-0">
        <div class="card-body">

          <div id="auth-error" class="alert alert-danger d-none"></div>

          <h3 class="text-center text-primary mb-4">
            <i class="fas fa-lock"></i> Verify Your Email
          </h3>

          <p class="text-muted text-center mb-4">
            Enter the 4-digit OTP sent to your {{email}}.
          </p>

          <form id="otpForm" data-url="{{ url_for('auth.verify_otp') }}">

            <div class="d-flex justify-content-between mb-3" style="width: 80%; margin: auto;">
              <input type="text" maxlength="1" class="otp-input form-control text-center" id="otp1">
              <input type="text" maxlength="1" class="otp-input form-control text-center" id="otp2">
              <input type="text" maxlength="1" class="otp-input form-control text-center" id="otp3">
              <input type="text" maxlength="1" class="otp-input form-control text-center" id="otp4">
            </div>

            <button type="submit" class="btn btn-success w-100 mt-3">Verify OTP</button>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
